services:
  - type: web
    name: talgarclean-web
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: talgarclean-db
          property: connectionString
      - key: PORT
        value: "10000"
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: AUTH_SECRET
        generateValue: true
      - key: DISPATCHER_LOGIN
        value: dispatcher
      - key: DISPATCHER_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: VITE_MAPBOX_TOKEN
        sync: false
      - key: PHOTO_ARCHIVE_PROVIDER
        value: yandex
      - key: YANDEX_DISK_TOKEN
        sync: false
      - key: YANDEX_DISK_BASE_PATH
        value: disk:/Talgarclean/photos

databases:
  - name: talgarclean-db
    plan: basic-256mb
    region: frankfurt
    postgresMajorVersion: "17"
